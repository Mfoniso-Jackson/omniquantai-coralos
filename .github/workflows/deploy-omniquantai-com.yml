name: Deploy omniquantai.com

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "examples/marketplace/web/**"
      - ".github/workflows/deploy-omniquantai-com.yml"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web dependencies
        run: npm install --prefix examples/marketplace/web

      - name: Typecheck web app
        run: npm run typecheck --prefix examples/marketplace/web

      - name: Build omniquantai.com
        run: npm run build --prefix examples/marketplace/web
        env:
          VITE_API_BASE_URL: https://omniquantai-private-api.onrender.com

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: examples/marketplace/web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
