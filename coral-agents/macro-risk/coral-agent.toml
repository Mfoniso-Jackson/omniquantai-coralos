edition = 4

[agent]
name = "macro-risk"
version = "0.1.0"
description = "OmniQuantAI seller persona for rates, inflation, liquidity, sector, and macro risk."
summary = "Bids on omniquant requests and delivers macro risk intelligence for the paid report."
readme = "Uses the seller-agent image with SERVICES=omniquant. Competes in CoralOS, verifies escrow, and delivers macro-risk intelligence."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
AGENT_NAME = { type = "string", default = "macro-risk", description = "Market identity for this seller persona" }
SERVICES = { type = "string", default = "omniquant", description = "Inventory; OmniQuantAI financial intelligence" }
FLOOR_SOL = { type = "f64", default = 0.009, description = "Minimum bid in SOL" }
PERSONA = { type = "string", default = "Macro Risk Agent: rates, inflation, liquidity, and macro risk for growth equities.", description = "Bidding persona" }
SERVICE = { type = "string", default = "omniquant", description = "Delivery service" }
RELEVANCE = { type = "f64", default = 82, description = "Buyer scoring input" }
EXPECTED_QUALITY = { type = "f64", default = 80, description = "Buyer scoring input" }
CONFIDENCE = { type = "f64", default = 74, description = "Buyer scoring input" }
DOMAIN_FIT = { type = "f64", default = 88, description = "Buyer scoring input" }
SPEED_SECONDS = { type = "f64", default = 16, description = "Expected delivery speed" }
EXPLANATION_QUALITY = { type = "f64", default = 78, description = "Buyer scoring input" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter | direct" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 600, description = "Refund deadline" }
TRACE = { type = "string", default = "", description = "Set to 1 for logs" }

[runtimes.docker]
image = "seller-agent:0.1.0"
