[build]
builder = "DOCKERFILE"
dockerfilePath = "infrastructure/docker/api.Dockerfile"

[deploy]
startCommand = "npm run start --prefix examples/marketplace/feed"
healthcheckPath = "/ready"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[env]
PORT = "4000"
NODE_ENV = "production"
CORAL_NAMESPACE = "omniquant"
OMNIQUANT_PERSIST = "1"
